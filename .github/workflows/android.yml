name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build React app & Android APK
    runs-on: ubuntu-latest

    steps:
      # 1. Obtener el código
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # 2. Configurar Node.js
      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # 3. Configurar Java JDK 17
      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 4. Configurar Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 5. Instalar dependencias del Frontend
      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm install

      # 6. Compilar la aplicación React (Vite)
      - name: Build Web Assets (React)
        run: |
          cd frontend
          npm run build

      # 7. Sincronizar activos de Capacitor con Android
      - name: Sync Capacitor Android
        run: |
          cd frontend
          npx cap sync android

      # 8. Dar permisos de ejecución a Gradle Wrapper
      - name: Grant Execute Permission to Gradlew
        run: chmod +x frontend/android/gradlew

      # 9. Compilar APK Debug
      - name: Build Android Debug APK
        run: |
          cd frontend/android
          ./gradlew assembleDebug

      # 10. Subir el APK compilado como artefacto de GitHub
      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: emin-portal-debug-apk
          path: frontend/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
